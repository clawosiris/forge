---
- name: Stop fleet manager service before rotating secrets
  ansible.builtin.shell: systemctl --user stop fleet-manager.service || true
  args:
    executable: /bin/bash
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.user_uid }}"
  changed_when: false

- name: Recreate Anthropic podman secret
  ansible.builtin.shell: |
    set -euo pipefail
    podman secret inspect anthropic-api-key >/dev/null 2>&1 && podman secret rm anthropic-api-key >/dev/null || true
    printf '%s' '{{ vault_anthropic_api_key }}' | podman secret create anthropic-api-key - >/dev/null
  args:
    executable: /bin/bash
  no_log: true

- name: Recreate OpenAI podman secret
  ansible.builtin.shell: |
    set -euo pipefail
    podman secret inspect openai-api-key >/dev/null 2>&1 && podman secret rm openai-api-key >/dev/null || true
    printf '%s' '{{ vault_openai_api_key }}' | podman secret create openai-api-key - >/dev/null
  args:
    executable: /bin/bash
  no_log: true

- name: Recreate gateway podman secret
  ansible.builtin.shell: |
    set -euo pipefail
    podman secret inspect gateway-token >/dev/null 2>&1 && podman secret rm gateway-token >/dev/null || true
    printf '%s' '{{ vault_gateway_token }}' | podman secret create gateway-token - >/dev/null
  args:
    executable: /bin/bash
  no_log: true
