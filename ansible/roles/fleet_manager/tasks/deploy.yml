---
- name: Ensure fleet network exists
  containers.podman.podman_network:
    name: "{{ fleet_manager_network }}"
    state: present

- name: Render OpenClaw config
  ansible.builtin.template:
    src: openclaw.json5.j2
    dest: "{{ fleet_manager_openclaw_config_path }}"
    mode: "0600"
  notify: restart fleet manager

- name: Render fleet manager quadlet
  ansible.builtin.template:
    src: fleet-manager.container.j2
    dest: "{{ fleet_manager_quadlet_path }}"
    mode: "0644"
  notify: restart fleet manager

- name: Reload user systemd
  ansible.builtin.command: systemctl --user daemon-reload
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.user_uid }}"
  changed_when: false

- name: Enable and start fleet manager service
  ansible.builtin.command: systemctl --user enable --now fleet-manager.service
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.user_uid }}"
  changed_when: false
