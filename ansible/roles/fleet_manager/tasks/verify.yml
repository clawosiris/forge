---
- name: Wait for gateway port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ fleet_manager_port }}"
    delay: 2
    timeout: 30

- name: Check user service state
  ansible.builtin.command: systemctl --user is-active fleet-manager.service
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.user_uid }}"
  register: fleet_manager_service_state
  changed_when: false

- name: Assert fleet manager service is active
  ansible.builtin.assert:
    that:
      - fleet_manager_service_state.stdout == 'active'
    fail_msg: fleet-manager.service failed to start
